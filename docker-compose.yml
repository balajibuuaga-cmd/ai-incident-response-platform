version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: incident-postgres
    environment:
      POSTGRES_DB: incident_response_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - incident_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./incident-response-platform
    container_name: incident-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/incident_response_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    build: ./incident-response-frontend
    container_name: incident-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  incident_postgres_data: